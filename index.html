<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DevShop Challenge: Duolingo Feature Prototype</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <main class="app">

    <header class="app-header">
      <p class="eyebrow">DevShop Challenge</p>
      <h1>Build Your Duolingo Feature</h1>
      <p class="subtitle">Pick ONE feature below, then build the logic in <code>script.js</code></p>
    </header>

    <!--
      ============================================
      FEATURE STAT DISPLAY
      ============================================
      This is where your game state shows up on screen.
      Rename these labels/values to match the feature your team picked.

      Examples:
        Lives System      -> "Lives" / "❤️ ❤️ ❤️"
        Streak Tracker     -> "Streak" / "0 days"
        Random Rewards     -> "Last Reward" / "—"
        XP & Scoring       -> "XP" / "0"
    -->
    <section class="stat-card">
      <p class="stat-label" id="statLabel">Lives</p>
      <p class="stat-value" id="statValue">3</p>
    </section>

    <!--
      ============================================
      MESSAGE / FEEDBACK AREA
      ============================================
      Your IF -> THEN logic will change the text in here.
      This is the "Give Feedback" step from the game loop.
    -->
    <p class="message" id="message">Press "Answer" to begin!</p>

    <!--
      ============================================
      ACTION BUTTONS
      ============================================
      answerBtn  -> simulates a player taking an action (answering a question)
      resetBtn   -> resets your game state back to the starting values
    -->
    <div class="button-row">
      <button id="answerBtn" class="btn btn-primary">✅ Submit Answer</button>
      <button id="resetBtn" class="btn btn-secondary">🔄 Reset</button>
    </div>

    <!--
      ============================================
      DEV CONSOLE (for your team, not the player)
      ============================================
      Use this area (and console.log in script.js) to see what's
      happening behind the scenes while you build and test.
    -->
    <section class="dev-console">
      <p class="dev-console-label">🧪 Dev Console</p>
      <p id="devLog">Waiting for input...</p>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
